[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "BUSL-1.1",
]
# model2vec has no license field — allow it explicitly
exceptions = [
    { allow = ["MIT"], name = "model2vec" },
]

[bans]
multiple-versions = "warn"
deny = []

[advisories]
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
