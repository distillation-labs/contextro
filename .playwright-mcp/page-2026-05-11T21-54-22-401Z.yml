        - code [ref=e318]: apps/app/src/features/data-grid-live/components/data-grid/data-grid.tsx
        - text: . Contextro returned the expected file in the ranked result set. This is a small miss, but it is useful because it shows where repeated identifier names still make a multi-step grep workflow brittle even under deterministic scripting.
      - paragraph [ref=e319]: The more important qualitative result is the absence of silent degradation in the treatment arm. Contextro was correct on every task category that the harness exercised. That does not prove broad coding superiority, but it does support the narrower claim that the current Rust implementation can answer deterministic discovery tasks compactly and reliably on this repository.
    - generic [ref=e320]:
      - heading "6. Discussion" [level=2] [ref=e321]
      - paragraph [ref=e322]: "The central result is a workflow result, not a marketing one. When the retrieval layer can answer a discovery question directly, the agent no longer needs to spend most of its context budget on exploratory file traversal. The 91.2% token reduction in this study is therefore best understood as a reduction in exploration waste: fewer grep traces, fewer file windows, and fewer intermediate steps."
      - paragraph [ref=e323]: The pure-Rust transition matters for the credibility of that claim. The current server, the current handlers, and the current benchmark harness all live in the same Rust codebase. The numbers in this paper do not come from the earlier Python-era architecture and do not depend on the older JavaScript simulator. They describe the current MCP as it exists now.
      - paragraph [ref=e324]: The category breakdown also keeps the result honest. Document-symbol tasks do not show dramatic latency gains because the baseline is already close to direct file access. Contextro still helps there because the response is more compact, but not every category should be expected to improve in the same way.
    - generic [ref=e325]:
      - heading "7. Limitations" [level=2] [ref=e326]
      - paragraph [ref=e327]:
        - text: This paper has four important limitations. First, it studies a single private repository, so the result should be read as strong evidence on
        - code [ref=e328]: platform
        - text: ", not as a universal repository claim. Second, the benchmark uses a pre-indexed local repository and measures direct handler latency, not full end-to-end agent runtime with model reasoning and transport overhead. Third, the task inventory is deterministic and retrieval-oriented rather than a full autonomous coding benchmark."
      - paragraph [ref=e329]:
        - text: Fourth, and most importantly, the current TypeScript and JavaScript parser path produced zero call relationships on this repository. That forced us to exclude
        - code [ref=e330]: find_callers
        - text: ","
        - code [ref=e331]: find_callees
        - text: ","
        - code [ref=e332]: impact
        - text: ", and relationship-rich"
        - code [ref=e333]: explain
        - text: tasks from the study. The paper therefore should not be read as evidence that the current system already delivers graph-quality answers on TypeScript-heavy repositories. Fixing that parser limitation is the most important technical follow-up after this benchmark.
      - paragraph [ref=e334]:
        - text: The benchmark also favors exact identifier retrieval. The 300 exact-search tasks use
        - code [ref=e335]: search(mode="bm25")
        - text: because that path admits deterministic scoring from indexed ground truth. That makes the result clean and reproducible, but it leaves open a separate question about free-form natural-language search quality, which deserves its own study.
