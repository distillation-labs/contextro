    - generic [ref=e15]:
      - heading "1. Introduction" [level=2] [ref=e16]
      - paragraph [ref=e17]: Most coding agents still locate code the expensive way. They grep broadly, open several files, inspect mostly irrelevant windows, and only then recover the symbol or file they needed. That workflow wastes tokens because it sends exploration traces rather than direct answers.
      - paragraph [ref=e18]: Contextro is built to replace that exploration trace with targeted repository intelligence. It exposes indexed search, symbol lookup, code operations, history lookup, and memory through a local MCP server so a client can ask for a definition, a ranked exact-search result, or a file-local symbol list directly.
      - paragraph [ref=e19]:
        - text: The earlier Contextro paper is no longer the right description of the system. The current implementation is Rust end to end, and the benchmark in this paper is produced by a real Rust study harness that invokes the current retrieval handlers directly. No Python runtime and no legacy
        - code [ref=e20]: ctx_fast
        - text: path remain in the evaluated system.
      - list [ref=e21]:
        - listitem [ref=e22]:
          - text: We report the first controlled 1,000-task benchmark for the current pure-Rust Contextro implementation on the private
          - code [ref=e23]: platform
          - text: repository.
        - listitem [ref=e24]:
          - text: We compare Contextro against a stronger scripted local baseline based on exact
          - code [ref=e25]: git grep
          - text: and bounded file reads, not against a simulator.
        - listitem [ref=e26]: "We state capability limits explicitly: graph-dependent tasks are excluded because the fresh TypeScript-heavy index contained zero call relationships."
    - generic [ref=e27]:
      - heading "2. Related Work" [level=2] [ref=e28]
      - paragraph [ref=e29]: "This work sits at the intersection of code search, retrieval-augmented generation, and prompt-budget management. BM25-style lexical retrieval remains a strong baseline for identifier-heavy search, while structured retrieval and code graphs are increasingly used to keep only relevant evidence in the context window. Our contribution is narrower than a general code-generation paper: we measure repository-discovery cost inside MCP-mediated workflows and ask how much of that cost disappears when the client can query a local repository-intelligence layer instead of traversing files manually."
    - generic [ref=e30]:
      - heading "3. Current System" [level=2] [ref=e31]
      - paragraph [ref=e32]: "Contextro is now implemented as a pure-Rust local MCP server. The workspace separates indexing, engines, parsing, memory, git helpers, tool handlers, and the server binary across focused crates, but the operational surface is still a single local binary. For this study, the important detail is architectural continuity: the benchmark harness reuses the same Rust retrieval paths that the server exposes, so the benchmark and the product measure the same code path rather than two different implementations."
      - figure "Figure 1. System overview. Contextro sits between the MCP client and the repository and returns structured retrieval results instead of exploratory file dumps." [ref=e33]:
