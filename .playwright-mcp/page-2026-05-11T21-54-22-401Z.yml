      - heading "5.2. Results by Task Category" [level=3] [ref=e271]
      - paragraph [ref=e272]: All four categories favored Contextro on token volume. The largest reduction appeared in symbol discovery (94.5%), where the treatment arm can usually answer the query with a single short symbol record. The smallest reduction appeared in document-symbol tasks (86.8%), which is expected because those tasks require the system to emit a list of file-local symbol names rather than a single location.
      - paragraph [ref=e273]: "Latency splits by category are also informative. The biggest latency gain appears in batch lookup because the baseline must perform three exact greps and three file reads. Document-symbol tasks are the exception: the baseline is already just one file read, so latency is roughly equal there even though Contextro still reduces output size materially."
