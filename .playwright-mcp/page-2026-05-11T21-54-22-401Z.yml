    - heading "Abstract" [level=2] [ref=e8]
    - paragraph [ref=e9]:
      - text: Repository discovery still dominates the prompt budget of many MCP-based coding workflows. This paper evaluates the current Rust-era version of Contextro, a pure-Rust local MCP server, with a deterministic 1,000-task paired study on a private production repository named
      - code [ref=e10]: platform
      - text: . The benchmark target contains 10,889 tracked files; Contextro indexed 8,498 source files into 11,534 symbols and 11,534 chunks. Against a stronger scripted local baseline built from exact
      - code [ref=e11]: git grep
      - text: "plus bounded file reads, Contextro reduced total token volume from 1,068,884 to 94,034 (91.2%), reduced median handler latency from 202.969 ms to 0.037 ms, reduced mean tool calls from 3.098 to 1.000, and eliminated file reads in the study harness. Contextro completed all 1,000 tasks; the baseline completed 999. Because the current TypeScript/JavaScript parser path emits zero call relationships on this repository, graph-dependent tasks were explicitly excluded. The resulting claim is therefore narrow and honest: on this repository, the current pure-Rust Contextro implementation materially reduces retrieval overhead for deterministic discovery and symbol-navigation tasks."
    - paragraph [ref=e12]:
