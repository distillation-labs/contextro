      - heading "4. Benchmark Methodology" [level=2] [ref=e129]
      - paragraph [ref=e130]: The study follows a paired, deterministic, two-arm design. Every task is executed once with a stronger scripted local baseline and once with Contextro against the same repository snapshot. The task generator draws the inventory from indexed ground truth rather than from free-form human prompts, so correctness can be scored mechanically.
      - figure "Figure 2. Study design. The same deterministic 1,000-task inventory is executed in both arms against the same repository snapshot." [ref=e131]:
        - img "Study design showing the same 1,000 tasks executed in a stronger local baseline and a Contextro treatment arm." [ref=e132]
        - generic [ref=e133]:
          - strong [ref=e134]: Figure 2.
          - text: Study design. The same deterministic 1,000-task inventory is executed in both arms against the same repository snapshot.
      - heading "4.1. Study Design" [level=3] [ref=e135]
      - paragraph [ref=e136]:
        - text: The stronger local baseline uses exact
        - code [ref=e137]: git grep
        - text: plus bounded file windows. Symbol-discovery tasks read up to two candidate files after a grep hit; exact-search tasks read up to three; batch-lookup tasks run three exact greps and read one primary file window for each symbol; document-symbol tasks open a single file excerpt directly. The treatment arm performs exactly one Contextro tool call per task against a pre-indexed repository state.
      - paragraph [ref=e138]: The task inventory contains 300 symbol-discovery tasks, 300 exact-search tasks, 200 batch-lookup tasks, and 200 document-symbol tasks. Batch and document-symbol tasks are intentionally stricter than single-file lookups because all expected files or symbols must appear for the task to count as correct.
