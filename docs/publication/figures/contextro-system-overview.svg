<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 490" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="sh" x="-6%" y="-6%" width="112%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0.5 L7,4 L0,7.5 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="490" fill="#f8fafc"/>

  <!-- Title -->
  <text x="550" y="40" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Contextro system overview</text>
  <text x="550" y="60" text-anchor="middle" font-size="11" fill="#64748b">Pure-Rust MCP server, shared indexing pipeline, and local repository intelligence surface</text>

  <!-- MCP Client card -->
  <rect x="32" y="82" width="222" height="112" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="143" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">MCP client</text>
  <text x="143" y="133" text-anchor="middle" font-size="10" fill="#64748b">Copilot, Claude, or any</text>
  <text x="143" y="149" text-anchor="middle" font-size="10" fill="#64748b">compatible MCP client</text>
  <text x="143" y="179" text-anchor="middle" font-size="9.5" fill="#94a3b8">sends requests</text>

  <!-- Server card (highlighted) -->
  <rect x="288" y="68" width="524" height="126" rx="6" fill="#eff6ff" stroke="#1e40af" stroke-width="1.5" filter="url(#sh)"/>
  <text x="550" y="99" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Contextro Rust server</text>
  <text x="550" y="118" text-anchor="middle" font-size="10" fill="#1e3a8a">Single local binary · MCP dispatch · tool handlers · shared app state</text>
  <rect x="340" y="129" width="420" height="28" rx="5" fill="#dbeafe"/>
  <text x="550" y="147" text-anchor="middle" font-size="9.5" fill="#1e40af">stdio / HTTP transport · indexed repository state · machine-readable outputs</text>
  <text x="550" y="177" text-anchor="middle" font-size="9.5" fill="#3b82f6">reads repository data</text>

  <!-- Repository card -->
  <rect x="846" y="82" width="222" height="112" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="957" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">Repository snapshot</text>
  <text x="957" y="133" text-anchor="middle" font-size="10" fill="#64748b">platform</text>
  <text x="957" y="149" text-anchor="middle" font-size="10" fill="#64748b">10,889 tracked files</text>
  <text x="957" y="165" text-anchor="middle" font-size="10" fill="#64748b">8,498 indexed</text>

  <!-- Horizontal arrows -->
  <line x1="254" y1="138" x2="286" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="846" y1="138" x2="814" y2="138" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Tree: server bottom → 4 engines -->
  <line x1="550" y1="194" x2="550" y2="210" stroke="#64748b" stroke-width="1.5"/>
  <line x1="157" y1="210" x2="943" y2="210" stroke="#64748b" stroke-width="1.5"/>
  <line x1="157" y1="210" x2="157" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="407" y1="210" x2="407" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="657" y1="210" x2="657" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="943" y1="210" x2="943" y2="220" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Engine card 1: Indexing pipeline -->
  <rect x="32" y="220" width="250" height="158" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="32" y="220" width="250" height="4" rx="3" fill="#0d9488"/>
  <text x="157" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">Indexing pipeline</text>
  <text x="157" y="276" text-anchor="middle" font-size="9.5" fill="#334155">file scan → parse → chunk</text>
  <text x="157" y="293" text-anchor="middle" font-size="9.5" fill="#334155">fresh index build for study</text>
  <text x="157" y="316" text-anchor="middle" font-size="9" fill="#64748b">11,534 symbols · 11,534 chunks</text>
  <text x="157" y="334" text-anchor="middle" font-size="9" fill="#64748b">built in 0.45 s</text>
  <text x="157" y="362" text-anchor="middle" font-size="8.5" fill="#94a3b8">used by all 1,000 tasks</text>

  <!-- Engine card 2: BM25 -->
  <rect x="294" y="220" width="250" height="158" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="294" y="220" width="250" height="4" rx="3" fill="#0d9488"/>
  <text x="419" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">BM25 retrieval</text>
  <text x="419" y="276" text-anchor="middle" font-size="9.5" fill="#334155">Tantivy lexical search</text>
  <text x="419" y="293" text-anchor="middle" font-size="9.5" fill="#334155">ranked exact-query results</text>
  <text x="419" y="316" text-anchor="middle" font-size="9" fill="#64748b">300 exact-search tasks</text>
  <text x="419" y="334" text-anchor="middle" font-size="9" fill="#64748b">BM25 index built in 34 ms</text>
  <text x="419" y="362" text-anchor="middle" font-size="8.5" fill="#94a3b8">primary retrieval engine</text>

  <!-- Engine card 3: Symbol ops -->
  <rect x="556" y="220" width="250" height="158" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="556" y="220" width="250" height="4" rx="3" fill="#0d9488"/>
  <text x="681" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#0d9488">Symbol operations</text>
  <text x="681" y="276" text-anchor="middle" font-size="9.5" fill="#334155">exact symbol lookup</text>
  <text x="681" y="293" text-anchor="middle" font-size="9.5" fill="#334155">file-local document symbols</text>
  <text x="681" y="316" text-anchor="middle" font-size="9" fill="#64748b">500 non-search tasks</text>
  <text x="681" y="334" text-anchor="middle" font-size="9" fill="#64748b">find_symbol + code ops</text>
  <text x="681" y="362" text-anchor="middle" font-size="8.5" fill="#94a3b8">name and file indexes</text>

  <!-- Engine card 4: Graph + Memory (excluded) -->
  <rect x="818" y="220" width="250" height="158" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="818" y="220" width="250" height="4" rx="3" fill="#cbd5e1"/>
  <text x="943" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#94a3b8">Graph and memory</text>
  <text x="943" y="276" text-anchor="middle" font-size="9.5" fill="#94a3b8">call graph, git history</text>
  <text x="943" y="293" text-anchor="middle" font-size="9.5" fill="#94a3b8">persistent memory store</text>
  <text x="943" y="316" text-anchor="middle" font-size="9" fill="#94a3b8">0 graph relationships</text>
  <text x="943" y="334" text-anchor="middle" font-size="9" fill="#94a3b8">on this codebase</text>
  <text x="943" y="362" text-anchor="middle" font-size="8.5" fill="#dc2626">tasks excluded from study</text>

  <!-- Note box -->
  <rect x="200" y="398" width="700" height="68" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="550" y="422" text-anchor="middle" font-size="11.5" font-weight="600" fill="#0f172a">Benchmark relevance</text>
  <text x="550" y="443" text-anchor="middle" font-size="10" fill="#475569">The study harness invokes the current Rust retrieval handlers directly — the paper measures</text>
  <text x="550" y="459" text-anchor="middle" font-size="10" fill="#475569">the same implementation that powers the live MCP server, not a simulated execution path.</text>
</svg>