<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0f3460"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="#fafafa"/>
  <text x="600" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Contextro system overview</text>
  <text x="600" y="64" text-anchor="middle" font-size="12" fill="#6b7280">Pure-Rust MCP server, shared indexing pipeline, and local repository intelligence surface</text>

  <rect x="70" y="120" width="250" height="110" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="195" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">MCP client</text>
  <text x="195" y="182" text-anchor="middle" font-size="12" fill="#6b7280">Copilot, Claude, or any</text>
  <text x="195" y="200" text-anchor="middle" font-size="12" fill="#6b7280">compatible MCP client</text>

  <rect x="390" y="102" width="420" height="146" rx="18" fill="#ffffff" stroke="#0f3460" stroke-width="2" filter="url(#shadow)"/>
  <text x="600" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#0f3460">Contextro Rust server</text>
  <text x="600" y="168" text-anchor="middle" font-size="13" fill="#1a1a2e">Single local binary with MCP dispatch, tool handlers, and shared app state</text>
  <rect x="468" y="184" width="264" height="38" rx="10" fill="#e8eef8"/>
  <text x="600" y="208" text-anchor="middle" font-size="12" font-weight="600" fill="#0f3460">stdio / HTTP transport • indexed repository state • machine-readable outputs</text>

  <rect x="880" y="120" width="250" height="110" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="1005" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a2e">Repository snapshot</text>
  <text x="1005" y="182" text-anchor="middle" font-size="12" fill="#6b7280">platform</text>
  <text x="1005" y="200" text-anchor="middle" font-size="12" fill="#6b7280">10,889 tracked files • 8,498 indexed</text>

  <line x1="320" y1="175" x2="390" y2="175" stroke="#0f3460" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="880" y1="175" x2="810" y2="175" stroke="#0f3460" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="90" y="330" width="235" height="132" rx="16" fill="#ffffff" stroke="#0d9488" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="208" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0d9488">Indexing pipeline</text>
  <text x="208" y="392" text-anchor="middle" font-size="12" fill="#1a1a2e">file scan → parse → chunk</text>
  <text x="208" y="411" text-anchor="middle" font-size="12" fill="#1a1a2e">fresh index build for the study</text>
  <text x="208" y="437" text-anchor="middle" font-size="12" fill="#6b7280">11,534 symbols • 11,534 chunks</text>

  <rect x="355" y="330" width="235" height="132" rx="16" fill="#ffffff" stroke="#0d9488" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="473" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0d9488">BM25 retrieval</text>
  <text x="473" y="392" text-anchor="middle" font-size="12" fill="#1a1a2e">Tantivy lexical search</text>
  <text x="473" y="411" text-anchor="middle" font-size="12" fill="#1a1a2e">ranked exact-query results</text>
  <text x="473" y="437" text-anchor="middle" font-size="12" fill="#6b7280">used by 300 exact-search tasks</text>

  <rect x="620" y="330" width="235" height="132" rx="16" fill="#ffffff" stroke="#0d9488" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="738" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0d9488">Symbol operations</text>
  <text x="738" y="392" text-anchor="middle" font-size="12" fill="#1a1a2e">exact symbol lookup and</text>
  <text x="738" y="411" text-anchor="middle" font-size="12" fill="#1a1a2e">file-local document symbols</text>
  <text x="738" y="437" text-anchor="middle" font-size="12" fill="#6b7280">used by 700 non-search tasks</text>

  <rect x="885" y="330" width="235" height="132" rx="16" fill="#ffffff" stroke="#0d9488" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1003" y="365" text-anchor="middle" font-size="15" font-weight="700" fill="#0d9488">Graph and memory</text>
  <text x="1003" y="392" text-anchor="middle" font-size="12" fill="#1a1a2e">call graph, git, and memory</text>
  <text x="1003" y="411" text-anchor="middle" font-size="12" fill="#1a1a2e">layers stay in the server stack</text>
  <text x="1003" y="437" text-anchor="middle" font-size="12" fill="#6b7280">but graph tasks were excluded here</text>

  <line x1="485" y1="248" x2="208" y2="330" stroke="#0f3460" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="248" x2="473" y2="330" stroke="#0f3460" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="640" y1="248" x2="738" y2="330" stroke="#0f3460" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="248" x2="1003" y2="330" stroke="#0f3460" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="220" y="535" width="760" height="86" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="600" y="567" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Benchmark relevance</text>
  <text x="600" y="592" text-anchor="middle" font-size="12" fill="#374151">The study harness invokes the current Rust retrieval handlers directly, so the paper measures the same implementation</text>
  <text x="600" y="610" text-anchor="middle" font-size="12" fill="#374151">that powers the live MCP server rather than a legacy or simulated execution path.</text>
</svg>
