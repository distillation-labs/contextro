<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="640" fill="#fafafa"/>
  <text x="600" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Headline benchmark outcomes</text>
  <text x="600" y="64" text-anchor="middle" font-size="12" fill="#6b7280">Each panel shows a matched baseline-versus-Contextro comparison on the same 1,000-task inventory</text>

  <g transform="translate(70 110)">
    <rect width="500" height="208" rx="18" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
    <text x="28" y="34" font-size="16" font-weight="700" fill="#1a1a2e">Total emitted tokens</text>
    <rect x="28" y="66" width="340" height="24" rx="12" fill="#fee2e2"/>
    <rect x="28" y="116" width="30" height="24" rx="12" fill="#e8eef8"/>
    <text x="380" y="83" font-size="12" font-weight="700" fill="#dc2626">Baseline · 1,068,884</text>
    <text x="70" y="133" font-size="12" font-weight="700" fill="#0f3460">Contextro · 94,034</text>
    <rect x="28" y="162" width="148" height="30" rx="15" fill="#ecfdf5"/>
    <text x="102" y="181" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">91.2% reduction</text>
  </g>

  <g transform="translate(630 110)">
    <rect width="500" height="208" rx="18" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
    <text x="28" y="34" font-size="16" font-weight="700" fill="#1a1a2e">Median handler latency</text>
    <rect x="28" y="66" width="340" height="24" rx="12" fill="#fee2e2"/>
    <rect x="28" y="116" width="14" height="24" rx="12" fill="#e8eef8"/>
    <text x="380" y="83" font-size="12" font-weight="700" fill="#dc2626">Baseline · 202.969 ms</text>
    <text x="54" y="133" font-size="12" font-weight="700" fill="#0f3460">Contextro · 0.037 ms</text>
    <rect x="28" y="162" width="198" height="30" rx="15" fill="#ecfdf5"/>
    <text x="127" y="181" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">202.932 ms lower</text>
  </g>

  <g transform="translate(70 362)">
    <rect width="500" height="208" rx="18" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
    <text x="28" y="34" font-size="16" font-weight="700" fill="#1a1a2e">Mean tool calls per task</text>
    <rect x="28" y="66" width="340" height="24" rx="12" fill="#fee2e2"/>
    <rect x="28" y="116" width="110" height="24" rx="12" fill="#e8eef8"/>
    <text x="380" y="83" font-size="12" font-weight="700" fill="#dc2626">Baseline · 3.098</text>
    <text x="150" y="133" font-size="12" font-weight="700" fill="#0f3460">Contextro · 1.000</text>
    <rect x="28" y="162" width="178" height="30" rx="15" fill="#ecfdf5"/>
    <text x="117" y="181" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">67.7% fewer calls</text>
  </g>

  <g transform="translate(630 362)">
    <rect width="500" height="208" rx="18" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
    <text x="28" y="34" font-size="16" font-weight="700" fill="#1a1a2e">Mean files read per task</text>
    <rect x="28" y="66" width="340" height="24" rx="12" fill="#fee2e2"/>
    <rect x="28" y="116" width="6" height="24" rx="12" fill="#e8eef8"/>
    <text x="380" y="83" font-size="12" font-weight="700" fill="#dc2626">Baseline · 1.898</text>
    <text x="46" y="133" font-size="12" font-weight="700" fill="#0f3460">Contextro · 0.000</text>
    <rect x="28" y="162" width="220" height="30" rx="15" fill="#ecfdf5"/>
    <text x="138" y="181" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">File traversal eliminated</text>
  </g>

  <rect x="440" y="86" width="320" height="26" rx="13" fill="#ffffff" stroke="#e5e7eb"/>
  <circle cx="470" cy="99" r="6" fill="#dc2626"/>
  <text x="484" y="103" font-size="11" fill="#6b7280">Stronger local baseline</text>
  <circle cx="676" cy="99" r="6" fill="#0f3460"/>
  <text x="690" y="103" font-size="11" fill="#6b7280">Contextro</text>
</svg>
