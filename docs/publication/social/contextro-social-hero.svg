<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#fafafa"/>
  <text x="800" y="58" text-anchor="middle" font-size="28" font-weight="700" fill="#1a1a2e">Contextro</text>
  <text x="800" y="90" text-anchor="middle" font-size="15" fill="#6b7280">Local code intelligence for AI agents</text>
  <text x="800" y="116" text-anchor="middle" font-size="13" fill="#6b7280">8,496-file production monorepo · 60 tasks · controlled paired experiment</text>

  <rect x="80" y="160" width="1440" height="140" rx="18" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="240" y="216" text-anchor="middle" font-size="18" font-weight="600" fill="#4b5563">Tokens</text>
  <text x="240" y="262" text-anchor="middle" font-size="48" font-weight="700" fill="#dc2626">95.6% fewer</text>
  <text x="240" y="290" text-anchor="middle" font-size="14" fill="#6b7280">328,272 -> 14,407</text>

  <text x="800" y="216" text-anchor="middle" font-size="18" font-weight="600" fill="#4b5563">Latency</text>
  <text x="800" y="262" text-anchor="middle" font-size="48" font-weight="700" fill="#0f3460">86x faster</text>
  <text x="800" y="290" text-anchor="middle" font-size="14" fill="#6b7280">448.35ms -> 5.21ms median</text>

  <text x="1360" y="216" text-anchor="middle" font-size="18" font-weight="600" fill="#4b5563">Files read</text>
  <text x="1360" y="262" text-anchor="middle" font-size="48" font-weight="700" fill="#059669">0</text>
  <text x="1360" y="290" text-anchor="middle" font-size="14" fill="#6b7280">during discovery workflows</text>

  <rect x="80" y="340" width="680" height="410" rx="18" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="420" y="388" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">How it works</text>
  <rect x="140" y="485" width="150" height="86" rx="14" fill="#1e293b"/>
  <text x="215" y="525" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">AI Agent</text>
  <text x="215" y="548" text-anchor="middle" font-size="11" fill="#94a3b8">Claude, Cursor, Copilot</text>

  <line x1="290" y1="528" x2="360" y2="528" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="370" y="485" width="150" height="86" rx="14" fill="#7c3aed"/>
  <text x="445" y="525" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">MCP</text>
  <text x="445" y="548" text-anchor="middle" font-size="11" fill="#e0d4fc">stdio, HTTP, streamable</text>

  <line x1="520" y1="528" x2="590" y2="528" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="600" y="450" width="120" height="160" rx="14" fill="#0f3460"/>
  <text x="660" y="494" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Contextro</text>
  <text x="660" y="522" text-anchor="middle" font-size="12" fill="#93c5fd">35 tools</text>
  <text x="660" y="546" text-anchor="middle" font-size="12" fill="#93c5fd">Local-first</text>
  <text x="660" y="570" text-anchor="middle" font-size="12" fill="#93c5fd">No cloud</text>

  <rect x="830" y="340" width="690" height="410" rx="18" fill="#ffffff" stroke="#e5e7eb" filter="url(#shadow)"/>
  <text x="1175" y="388" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a2e">Core engines</text>

  <rect x="880" y="450" width="120" height="110" rx="12" fill="#0d9488"/>
  <text x="940" y="490" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">Vector</text>
  <text x="940" y="515" text-anchor="middle" font-size="11" fill="#ccfbf1">LanceDB</text>

  <rect x="1020" y="450" width="120" height="110" rx="12" fill="#0d9488"/>
  <text x="1080" y="490" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">BM25</text>
  <text x="1080" y="515" text-anchor="middle" font-size="11" fill="#ccfbf1">Exact match</text>

  <rect x="1160" y="450" width="120" height="110" rx="12" fill="#0d9488"/>
  <text x="1220" y="490" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">Graph</text>
  <text x="1220" y="515" text-anchor="middle" font-size="11" fill="#ccfbf1">rustworkx</text>

  <rect x="1300" y="450" width="120" height="110" rx="12" fill="#0d9488"/>
  <text x="1360" y="490" text-anchor="middle" font-size="16" font-weight="600" fill="#ffffff">Memory</text>
  <text x="1360" y="515" text-anchor="middle" font-size="11" fill="#ccfbf1">Cross-session</text>

  <rect x="880" y="590" width="540" height="86" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="1150" y="624" text-anchor="middle" font-size="15" font-weight="600" fill="#1a1a2e">Distillation Labs paper + reproducible benchmarks</text>
  <text x="1150" y="648" text-anchor="middle" font-size="11" fill="#6b7280">Local code intelligence beats file-by-file guessing for discovery workflows</text>
</svg>
