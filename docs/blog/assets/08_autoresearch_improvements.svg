<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" font-family="Inter, -apple-system, system-ui, sans-serif">
  <rect width="1000" height="450" fill="#fafafa"/>
  <text x="500" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a2e">Autoresearch Loop: Measured Improvements</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#6b7280">Each metric improved through disciplined one-variable experiments</text>

  <!-- Table-style layout -->
  <!-- Headers -->
  <text x="80" y="105" font-size="12" font-weight="600" fill="#4b5563">Metric</text>
  <text x="350" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#4b5563">Before</text>
  <text x="520" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#4b5563">After</text>
  <text x="700" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="#4b5563">Improvement</text>
  <line x1="60" y1="115" x2="940" y2="115" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Row 1: Hybrid MRR -->
  <text x="80" y="150" font-size="13" fill="#1a1a2e">Hybrid MRR</text>
  <text x="350" y="150" text-anchor="middle" font-size="13" fill="#6b7280">0.625</text>
  <text x="520" y="150" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">1.000</text>
  <rect x="650" y="137" width="100" height="20" rx="10" fill="#ecfdf5"/>
  <text x="700" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">+60%</text>

  <!-- Row 2: Tokens/search -->
  <text x="80" y="195" font-size="13" fill="#1a1a2e">Tokens per search</text>
  <text x="350" y="195" text-anchor="middle" font-size="13" fill="#6b7280">378</text>
  <text x="520" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">116</text>
  <rect x="650" y="182" width="100" height="20" rx="10" fill="#ecfdf5"/>
  <text x="700" y="197" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">−69%</text>

  <!-- Row 3: Tokens/explain -->
  <text x="80" y="240" font-size="13" fill="#1a1a2e">Tokens per explain</text>
  <text x="350" y="240" text-anchor="middle" font-size="13" fill="#6b7280">229</text>
  <text x="520" y="240" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">43</text>
  <rect x="650" y="227" width="100" height="20" rx="10" fill="#ecfdf5"/>
  <text x="700" y="242" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">−81%</text>

  <!-- Row 4: Index time -->
  <text x="80" y="285" font-size="13" fill="#1a1a2e">Indexing speed (3,349 files)</text>
  <text x="350" y="285" text-anchor="middle" font-size="13" fill="#6b7280">12.4s</text>
  <text x="520" y="285" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">6.8s</text>
  <rect x="650" y="272" width="100" height="20" rx="10" fill="#ecfdf5"/>
  <text x="700" y="287" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">−45%</text>

  <!-- Row 5: Cache hit rate -->
  <text x="80" y="330" font-size="13" fill="#1a1a2e">Cache hit rate</text>
  <text x="350" y="330" text-anchor="middle" font-size="13" fill="#6b7280">0.23</text>
  <text x="520" y="330" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">0.46</text>
  <rect x="650" y="317" width="100" height="20" rx="10" fill="#ecfdf5"/>
  <text x="700" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">+100%</text>

  <!-- Row 6: Workflow tokens -->
  <text x="80" y="375" font-size="13" fill="#1a1a2e">Total workflow tokens (16 calls)</text>
  <text x="350" y="375" text-anchor="middle" font-size="13" fill="#6b7280">2,547</text>
  <text x="520" y="375" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">1,043</text>
  <rect x="650" y="362" width="100" height="20" rx="10" fill="#ecfdf5"/>
  <text x="700" y="377" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">−59%</text>

  <!-- Separator lines -->
  <line x1="60" y1="165" x2="940" y2="165" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="210" x2="940" y2="210" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="255" x2="940" y2="255" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="300" x2="940" y2="300" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="60" y1="345" x2="940" y2="345" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Footer note -->
  <text x="500" y="425" text-anchor="middle" font-size="11" fill="#9ca3af">Each improvement validated through benchmark → implement → benchmark → keep/discard cycle</text>
</svg>
