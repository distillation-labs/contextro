services:
  contextro:
    container_name: contextro-mcp
    image: ${CONTEXTRO_IMAGE:-ghcr.io/distillation-labs/contextro-mcp:latest}
    ports:
      - "8000:8000"
    volumes:
      # Persistent index storage — survives container restarts
      - contextro-data:/data
      # Mount the codebase you want to index. Set CTX_CODEBASE_HOST_PATH first.
      - ${CTX_CODEBASE_HOST_PATH:?set CTX_CODEBASE_HOST_PATH to your repo path}:/repos/platform:ro
    environment:
      CTX_STORAGE_DIR: /data/.contextro
      CTX_CODEBASE_HOST_PATH: ${CTX_CODEBASE_HOST_PATH:?set CTX_CODEBASE_HOST_PATH to your repo path}
      CTX_CODEBASE_MOUNT_PATH: /repos/platform
      # Map the host path your client sends to the mounted path inside the container.
      CTX_PATH_PREFIX_MAP: ${CTX_PATH_PREFIX_MAP:-}
      CTX_EMBEDDING_MODEL: potion-code-16m
      CTX_TRANSPORT: http
      CTX_HTTP_HOST: 0.0.0.0
      CTX_HTTP_PORT: "8000"
      CTX_LOG_LEVEL: INFO
      CTX_LOG_FORMAT: json
      CTX_COMMIT_HISTORY_ENABLED: "true"
      CTX_REALTIME_INDEXING_ENABLED: "false" # disable file watcher in Docker
      CTX_FILE_WATCHER_ENABLED: "false"
      CTX_AUTO_WARM_START: "true" # restore index from disk on restart (no re-index needed)
      CTX_SEARCH_CACHE_TTL_SECONDS: "300"
      CTX_SEARCH_SANDBOX_TTL_SECONDS: "600"
      CTX_SEARCH_SANDBOX_THRESHOLD_TOKENS: "1200"
      CTX_SEARCH_PREVIEW_RESULTS: "4"
      CTX_SEARCH_PREVIEW_CODE_CHARS: "220"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  contextro-data:
    driver: local
