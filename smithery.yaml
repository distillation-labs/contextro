# Smithery.ai marketplace configuration for Contextro
# https://smithery.ai/docs/build/project-config/smithery-yaml

runtime: "python"

startCommand:
  type: "stdio"
  configSchema:
    type: "object"
    properties:
      storage_dir:
        type: "string"
        description: "Storage directory for indexes (default: .contextro)"
        default: ".contextro"
      embedding_model:
        type: "string"
        description: "Embedding model: potion-code-16m (256d, 55k/sec)"
        default: "potion-code-16m"
        enum:
          - "potion-code-16m"
      max_memory_mb:
        type: "integer"
        description: "Memory budget in MB"
        default: 350
      search_mode:
        type: "string"
        description: "Default search mode"
        default: "hybrid"
        enum:
          - "hybrid"
          - "vector"
          - "bm25"
      log_level:
        type: "string"
        description: "Logging level"
        default: "INFO"
        enum:
          - "DEBUG"
          - "INFO"
          - "WARNING"
          - "ERROR"
  commandFunction: |-
    (config) => ({
      command: 'contextro',
      args: [],
      env: {
        CTX_STORAGE_DIR: config.storage_dir || '.contextro',
        CTX_EMBEDDING_MODEL: config.embedding_model || 'potion-code-16m',
        CTX_MAX_MEMORY_MB: String(config.max_memory_mb || 350),
        CTX_SEARCH_MODE: config.search_mode || 'hybrid',
        CTX_LOG_LEVEL: config.log_level || 'INFO',
        CTX_EMBEDDING_DEVICE: 'cpu',
        CTX_LOG_FORMAT: 'text'
      }
    })
