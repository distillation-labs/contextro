services:
  contextia-dev:
    container_name: contextia-mcp-dev
    build:
      context: .
    image: contextia-mcp-dev:local
    command: ["python", "/app/scripts/dev_http_server.py"]
    ports:
      - "${CONTEXTIA_DEV_HTTP_PORT:-8000}:8000"
    volumes:
      - contextia-dev-data:/data
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./pyproject.toml:/app/pyproject.toml:ro
      - ${CTX_CODEBASE_HOST_PATH:?set CTX_CODEBASE_HOST_PATH to the repo Contextia should index}:/repos/platform:ro
    environment:
      CTX_STORAGE_DIR: /data/.contextia
      CTX_CODEBASE_HOST_PATH: ${CTX_CODEBASE_HOST_PATH:?set CTX_CODEBASE_HOST_PATH to the repo Contextia should index}
      CTX_CODEBASE_MOUNT_PATH: /repos/platform
      CTX_PATH_PREFIX_MAP: ${CTX_PATH_PREFIX_MAP:-}
      CTX_EMBEDDING_MODEL: potion-code-16m
      CTX_TRANSPORT: http
      CTX_HTTP_HOST: 0.0.0.0
      CTX_HTTP_PORT: "8000"
      CTX_LOG_LEVEL: ${CTX_LOG_LEVEL:-INFO}
      CTX_LOG_FORMAT: ${CTX_LOG_FORMAT:-text}
      CTX_COMMIT_HISTORY_ENABLED: "true"
      CTX_REALTIME_INDEXING_ENABLED: "false"
      CTX_FILE_WATCHER_ENABLED: "false"
      CTX_AUTO_WARM_START: "true"
      CTX_SEARCH_CACHE_TTL_SECONDS: "300"
      CTX_SEARCH_SANDBOX_TTL_SECONDS: "600"
      CTX_SEARCH_SANDBOX_THRESHOLD_TOKENS: "1200"
      CTX_SEARCH_PREVIEW_RESULTS: "4"
      CTX_SEARCH_PREVIEW_CODE_CHARS: "220"
      CONTEXTIA_DEV_DEBOUNCE_SECONDS: ${CONTEXTIA_DEV_DEBOUNCE_SECONDS:-1.0}
      CONTEXTIA_DEV_LOG_LEVEL: ${CONTEXTIA_DEV_LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "/app/scripts/docker_healthcheck.py"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

volumes:
  contextia-dev-data:
    driver: local
