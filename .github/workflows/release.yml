name: Release
# Required secrets:
#   NPM_TOKEN   — https://www.npmjs.com/settings/~/tokens (Automation token)


on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  verify-tag:
    name: Verify release tag
    runs-on: ubuntu-latest
    steps:
      - name: Check tag exists and points to a commit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Works for both lightweight and annotated tags.
          # For annotated tags, peel to the commit; for lightweight tags the
          # ref object IS the commit — either way we just confirm the ref exists.
          obj_type=$(gh api "repos/${{ github.repository }}/git/ref/tags/${TAG_NAME}" --jq '.object.type')
          if [[ -z "${obj_type}" ]]; then
            echo "Tag ${TAG_NAME} not found." >&2
            exit 1
          fi
          echo "Tag ${TAG_NAME} verified (object type: ${obj_type})"

  build:
    name: Build ${{ matrix.target }}
    needs: verify-tag
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: crates
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: "!matrix.cross"
        run: cargo build --release --bin contextro --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --bin contextro --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf contextro-${{ matrix.target }}.tar.gz contextro
          mv contextro-${{ matrix.target }}.tar.gz $GITHUB_WORKSPACE/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path contextro.exe -DestinationPath "$env:GITHUB_WORKSPACE\contextro-${{ matrix.target }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            contextro-${{ matrix.target }}.tar.gz
            contextro-${{ matrix.target }}.zip
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum contextro-*.tar.gz contextro-*.zip > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/contextro-*.tar.gz
            artifacts/contextro-*.zip
            artifacts/SHA256SUMS
          generate_release_notes: true

  publish-npm:
    name: Publish npm package
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        working-directory: npm/contextro
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

  publish-docker:
    name: Publish Docker image
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve Docker tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${{ github.repository_owner }}/contextro-mcp"
          {
            echo "tags<<EOF"
            echo "${image}:latest"
            echo "${image}:${version}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
